<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f0eee7">
<title>The Gomix Studio</title>
<meta name="description" content="Diseño gráfico & fotografía — The Gomix Studio. Portafolio, Behance, Instagram y contacto directo.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
  :root{
    --cream:#f0eee7;
    --sage-light:#adc3a2;
    --sage:#6a8c71;
    --ink:#2f3d31;
    --ink-soft:#52645480;
    --ink-soft-solid:#526454;
    --shadow:0 12px 28px -14px rgba(47,61,49,0.35);
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    background-color:var(--cream);
    background-image:
      radial-gradient(480px 480px at -8% -8%, rgba(173,195,162,0.40), rgba(173,195,162,0) 70%),
      radial-gradient(420px 420px at 108% 102%, rgba(173,195,162,0.35), rgba(173,195,162,0) 70%);
    background-attachment:fixed;
    font-family:'Nunito', sans-serif;
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
  }

  .card{
    width:100%;
    max-width:408px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .eyebrow{
    font-size:12px;
    font-weight:800;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--sage);
    margin:0 0 20px;
  }

  .mark{
    width:104px;
    height:auto;
    margin-bottom:16px;
    animation:breathe 5s ease-in-out infinite;
  }

  @keyframes breathe{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.035);}
  }

  .wordmark{
    font-family:'Nunito', sans-serif;
    font-weight:900;
    font-size:clamp(27px, 7vw, 34px);
    line-height:1.1;
    margin:0 0 12px;
    color:var(--sage);
    letter-spacing:-0.01em;
  }

  .tagline{
    font-size:15.5px;
    line-height:1.55;
    color:var(--ink-soft-solid);
    max-width:300px;
    margin:0 0 28px;
    font-weight:600;
  }

  .divider{
    width:120px;
    height:14px;
    display:block;
    margin:0 0 28px;
  }

  .links{
    display:flex;
    flex-direction:column;
    gap:12px;
    width:100%;
  }

  .btn{
    display:flex;
    align-items:center;
    gap:13px;
    padding:16px 22px;
    border-radius:999px;
    font-family:'Nunito', sans-serif;
    font-weight:700;
    font-size:15.5px;
    text-decoration:none;
    border:1.6px solid var(--sage-light);
    background:#fffdfa;
    color:var(--ink);
    transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
  }

  .btn svg{
    width:21px;
    height:21px;
    flex-shrink:0;
  }

  .btn:hover{
    transform:translateY(-2px);
    box-shadow:var(--shadow);
  }

  .btn:focus-visible{
    outline:3px solid var(--sage);
    outline-offset:2px;
  }

  .btn-primary{
    background:var(--ink);
    border-color:var(--ink);
    color:var(--cream);
    font-weight:800;
    padding:18px 22px;
  }

  .btn-primary:hover{
    filter:brightness(1.12);
  }

  footer{
    margin-top:32px;
    font-size:12.5px;
    color:var(--ink-soft-solid);
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:6px 8px;
    align-items:center;
    font-weight:700;
    letter-spacing:.02em;
  }

  footer .dot{opacity:.5;}

  @media (prefers-reduced-motion: reduce){
    .mark{animation:none;}
    .btn{transition:none;}
  }
</style>
</head>
